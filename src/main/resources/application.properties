# ==========================================
# 1. Server Config
# ==========================================
server.port=8080

# ==========================================
# 2. PostgreSQL & pgvector Config
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/nexus_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# 3. DeepSeek API Config (LLM)
# ==========================================
langchain4j.open-ai.chat-model.base-url=https://api.deepseek.com
langchain4j.open-ai.chat-model.api-key=sk-277c1e487e3e447893bd76f3a3bc2bed
langchain4j.open-ai.chat-model.model-name=deepseek-chat
langchain4j.open-ai.chat-model.temperature=0.0
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true

# ==========================================
# 4. Redis Config (Memory & Cache)
# ==========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0

